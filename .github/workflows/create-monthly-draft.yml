name: Create Monthly Draft Items

on:
  schedule:
    - cron: '0 0 1 * *'  # 毎月1日 00:00 UTC
  workflow_dispatch:
    inputs:
      year:
        description: '対象年 (例: 2026) ※空欄で当月'
        required: false
        default: ''
      month:
        description: '対象月 (例: 6) ※空欄で当月'
        required: false
        default: ''

run-name: "${{ github.event.inputs.year != '' && github.event.inputs.month != '' && format('{0}年{1}月 下書き作成', github.event.inputs.year, github.event.inputs.month) || '月次下書き作成' }}"

permissions:
  contents: read

jobs:
  create-drafts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set date variables
        id: date
        run: |
          if [ -n "${{ github.event.inputs.year }}" ] && [ -n "${{ github.event.inputs.month }}" ]; then
            year="${{ github.event.inputs.year }}"
            month=$(printf '%02d' "${{ github.event.inputs.month }}")
            month_ja="${{ github.event.inputs.month }}"
          else
            year=$(date +'%Y')
            month=$(date +'%m')
            month_ja=$(date +'%-m')
          fi
          echo "year=$year"       >> "$GITHUB_OUTPUT"
          echo "month=$month"     >> "$GITHUB_OUTPUT"
          echo "month_ja=$month_ja" >> "$GITHUB_OUTPUT"

      - name: Get project node ID
        id: project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          project_id=$(gh api graphql -f query='
            query {
              organization(login: "LibraryOfCoffee") {
                projectV2(number: 1) {
                  id
                }
              }
            }
          ' --jq '.data.organization.projectV2.id')
          echo "id=$project_id" >> "$GITHUB_OUTPUT"

      - name: Create draft items from templates
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: ${{ steps.project.outputs.id }}
          YEAR: ${{ steps.date.outputs.year }}
          MONTH: ${{ steps.date.outputs.month }}
          MONTH_JA: ${{ steps.date.outputs.month_ja }}
        run: |
          for template in templates/*.md; do
            [ -f "$template" ] || continue

            # フロントマター (--- ... ---) からタイトルを取得
            raw_title=$(sed -n '/^---$/,/^---$/{ /^title:/{ s/^title:[[:space:]]*//; s/^"//; s/"$//; p; } }' "$template")

            # フロントマターから assignees (スペース区切りのユーザー名) を取得
            raw_assignees=$(sed -n '/^---$/,/^---$/{ /^assignees:/{ s/^assignees:[[:space:]]*//; s/^"//; s/"$//; p; } }' "$template")

            # --- より後ろを本文として取得
            raw_body=$(awk 'BEGIN{fm=0} /^---$/{fm++; next} fm>=2{print}' "$template")

            # プレースホルダー置換
            title=$(echo "$raw_title" | sed "s/{{YEAR}}/$YEAR/g; s/{{MONTH}}/$MONTH/g; s/{{MONTH_JA}}/$MONTH_JA/g")
            body=$(echo "$raw_body"  | sed "s/{{YEAR}}/$YEAR/g; s/{{MONTH}}/$MONTH/g; s/{{MONTH_JA}}/$MONTH_JA/g")

            echo "Creating draft: $title"

            # ユーザー名をノード ID に変換して JSON 配列を構築
            assignee_ids_json="[]"
            if [ -n "$raw_assignees" ]; then
              ids=""
              for username in $raw_assignees; do
                user_id=$(gh api graphql -f query='query($login: String!) { user(login: $login) { id } }' \
                  -f login="$username" --jq '.data.user.id')
                ids="$ids \"$user_id\","
              done
              assignee_ids_json="[${ids%,}]"
            fi

            gh api graphql \
              -f query='
                mutation($projectId: ID!, $title: String!, $body: String!, $assigneeIds: [ID!]) {
                  addProjectV2DraftIssue(input: {
                    projectId: $projectId
                    title: $title
                    body: $body
                    assigneeIds: $assigneeIds
                  }) {
                    projectItem { id }
                  }
                }
              ' \
              -f projectId="$PROJECT_ID" \
              -f title="$title" \
              -f body="$body" \
              --raw-field "assigneeIds=$assignee_ids_json"
          done
